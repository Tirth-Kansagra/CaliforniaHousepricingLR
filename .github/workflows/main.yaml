name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        run: |
          services_json=$(curl -s \
            --request GET \
            --url "https://api.render.com/v1/services?name=${RENDER_APP_NAME}" \
            --header "accept: application/json" \
            --header "authorization: Bearer ${RENDER_API_KEY}")

          service_id=$(SERVICES_JSON="$services_json" RENDER_APP_NAME="$RENDER_APP_NAME" python - <<'PY'
import json
import os

services = json.loads(os.environ["SERVICES_JSON"])
target_name = os.environ["RENDER_APP_NAME"]

for item in services:
    service = item.get("service", {})
    if service.get("name") == target_name:
        print(service["id"])
        break
else:
    raise SystemExit(f"Render service not found: {target_name}")
PY
)

          curl --request POST \
            --url "https://api.render.com/v1/services/${service_id}/deploys" \
            --header "accept: application/json" \
            --header "authorization: Bearer ${RENDER_API_KEY}" \
            --header "content-type: application/json" \
            --data '{"clearCache":"do_not_clear","deployMode":"build_and_deploy"}'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_APP_NAME: ${{ secrets.RENDER_APP_NAME }}
